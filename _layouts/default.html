<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --paper: #ffffff;
        --text: #1f2937;
        --muted: #667085;
        --border: #d9dee7;
        --accent: #2563eb;
        --code-bg: #f1f5f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        line-height: 1.7;
      }

      .page {
        width: min(920px, calc(100% - 32px));
        margin: 32px auto;
      }

      .document {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: clamp(24px, 5vw, 56px);
      }

      h1,
      h2,
      h3 {
        line-height: 1.3;
        margin: 1.8em 0 0.7em;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }

      h2 {
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.25em;
        font-size: 1.45rem;
      }

      a {
        color: var(--accent);
      }

      p,
      ul,
      ol,
      blockquote,
      pre,
      table {
        margin: 0.9em 0;
      }

      blockquote {
        margin-left: 0;
        padding: 0.2em 1em;
        border-left: 4px solid var(--border);
        color: var(--muted);
      }

      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      code {
        background: var(--code-bg);
        border-radius: 4px;
        padding: 0.1em 0.35em;
      }

      pre {
        overflow-x: auto;
        background: var(--code-bg);
        border-radius: 8px;
        padding: 16px;
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow-x: auto;
        display: block;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        text-align: left;
      }

      th {
        background: #f8fafc;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      .footer {
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.92rem;
        text-align: center;
      }

      @media (max-width: 640px) {
        .page {
          width: 100%;
          margin: 0;
        }

        .document {
          border-width: 0 0 1px;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="document">
        {{ content }}
      </article>
      <footer class="footer">
        更新后 GitHub Pages 会自动发布到 fengqizihang.me
      </footer>
    </main>
  </body>
</html>
